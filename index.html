<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vision AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#070710;
      color:white;
      overflow-x:hidden;
      min-height:100vh;
    }

    .bg-animation{
      position:fixed;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at top left,#9333ea,transparent 30%),
      radial-gradient(circle at bottom right,#06b6d4,transparent 30%);
      filter:blur(60px);
      z-index:-1;
      animation:animateBg 8s infinite alternate;
    }

    @keyframes animateBg{
      from{
        transform:scale(1);
      }
      to{
        transform:scale(1.2);
      }
    }

    header{
      text-align:center;
      padding:30px 20px;
    }

    header h1{
      font-size:60px;
      color:#c084fc;
      text-shadow:0 0 25px #9333ea;
    }

    header p{
      margin-top:10px;
      color:#d1d5db;
      font-size:18px;
    }

    .top-buttons{
      position:absolute;
      top:20px;
      right:20px;
      display:flex;
      gap:10px;
    }

    .top-buttons button{
      padding:10px 18px;
      border:none;
      border-radius:12px;
      background:#9333ea;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .top-buttons button:hover{
      background:#7e22ce;
    }

    .container{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding-bottom:50px;
    }

    .card{
      width:90%;
      max-width:750px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(15px);
      border-radius:25px;
      padding:25px;
      box-shadow:0 0 40px rgba(147,51,234,0.3);
    }

    textarea{
      width:100%;
      height:150px;
      border:none;
      outline:none;
      resize:none;
      border-radius:15px;
      background:#10101c;
      color:white;
      padding:20px;
      font-size:16px;
    }

    textarea::placeholder{
      color:#9ca3af;
    }

    .suggestions{
      margin-top:15px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .suggestions button{
      padding:10px 15px;
      border:none;
      border-radius:12px;
      background:#1e1e2f;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .suggestions button:hover{
      background:#9333ea;
    }

    .generate-btn{
      width:100%;
      margin-top:20px;
      padding:16px;
      border:none;
      border-radius:15px;
      background:linear-gradient(90deg,#9333ea,#06b6d4);
      color:white;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .generate-btn:hover{
      transform:scale(1.03);
      box-shadow:0 0 25px #9333ea;
    }

    .image-section{
      margin-top:40px;
      text-align:center;
    }

    #image{
      width:400px;
      max-width:90%;
      border-radius:20px;
      display:none;
      box-shadow:0 0 40px rgba(147,51,234,0.4);
    }

    .loader{
      width:60px;
      height:60px;
      border:6px solid rgba(255,255,255,0.2);
      border-top:6px solid #9333ea;
      border-radius:50%;
      animation:spin 1s linear infinite;
      display:none;
      margin:auto;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    .action-buttons{
      margin-top:20px;
      display:none;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .action-buttons button{
      padding:14px 25px;
      border:none;
      border-radius:12px;
      background:#9333ea;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .action-buttons button:hover{
      background:#7e22ce;
    }

    #info{
      margin-top:25px;
      width:80%;
      max-width:700px;
      text-align:center;
      color:#e9d5ff;
      font-size:18px;
      line-height:1.7;
    }

    @media(max-width:768px){

      header h1{
        font-size:42px;
      }

      .card{
        width:95%;
      }

    }

  </style>
</head>

<body>

  <div class="bg-animation"></div>

  <div class="top-buttons">
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
  </div>

  <header>
    <h1>Vision AI</h1>
    <p>Create Amazing AI Images From Text</p>
  </header>

  <div class="container">

    <div class="card">

      <textarea id="prompt" placeholder="Describe your imagination..."></textarea>

      <div class="suggestions">
        <button onclick="setPrompt('Cyberpunk city at night')">Cyberpunk</button>

        <button onclick="setPrompt('Cute astronaut in space')">Astronaut</button>

        <button onclick="setPrompt('Futuristic AI robot')">AI Robot</button>

        <button onclick="setPrompt('APJ Abdul Kalam')">APJ Abdul Kalam</button>
      </div>

      <button class="generate-btn" onclick="generateImage()">
        Generate Image
      </button>

    </div>

    <div class="image-section">

      <div class="loader" id="loader"></div>

      <img id="image" src="" alt="Generated Image">

      <div class="action-buttons" id="actionButtons">

        <button onclick="downloadImage()">
          Download Image
        </button>

        <button onclick="shareImage()">
          Share Image
        </button>

      </div>

      <p id="info"></p>

    </div>

  </div>

  <script>

    function setPrompt(text){
      document.getElementById("prompt").value = text;
    }

    function login(){
      alert("Login Successful");
    }

    function logout(){
      alert("Logout Successful");
    }

    const infoData = {

      "apj abdul kalam":
      "Dr. APJ Abdul Kalam was an Indian aerospace scientist and the 11th President of India. He is known as the Missile Man of India.",

      "elon musk":
      "Elon Musk is the CEO of Tesla and SpaceX and one of the most influential tech entrepreneurs.",

      "virat kohli":
      "Virat Kohli is a famous Indian cricketer and former captain of the Indian cricket team.",

      "narendra modi":
      "Narendra Modi is the Prime Minister of India and a major political leader."

    };

    async function generateImage(){

      const prompt = document.getElementById("prompt").value;

      const image = document.getElementById("image");

      const loader = document.getElementById("loader");

      const infoBox = document.getElementById("info");

      const actionButtons =
      document.getElementById("actionButtons");

      if(prompt === ""){
        alert("Please enter a prompt");
        return;
      }

      loader.style.display = "block";

      image.style.display = "none";

      actionButtons.style.display = "none";

      try{

        const imageUrl =
        `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

        image.src = imageUrl;

        image.onload = () => {

          loader.style.display = "none";

          image.style.display = "block";

          actionButtons.style.display = "flex";
        }

        const lowerPrompt = prompt.toLowerCase();

        if(infoData[lowerPrompt]){

          infoBox.innerHTML =
          infoData[lowerPrompt];

        }
        else{

          infoBox.innerHTML =
          "AI generated image based on your imagination prompt.";

        }

      }
      catch(error){

        alert("Something went wrong");

      }

    }

    function downloadImage(){

      const image =
      document.getElementById("image").src;

      const link =
      document.createElement("a");

      link.href = image;

      link.download = "vision-ai-image.jpg";

      link.click();

    }

    async function shareImage(){

      const image =
      document.getElementById("image").src;

      if(navigator.share){

        await navigator.share({
          title:"Vision AI Image",
          text:"Check out this AI generated image!",
          url:image
        });

      }
      else{

        alert("Sharing not supported on this device");

      }

    }

  </script>

</body>
</html>
